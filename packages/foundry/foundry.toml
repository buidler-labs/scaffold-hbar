[profile.default]
src = 'contracts'
out = 'out'
libs = ['lib']
fs_permissions = [
    { access = "read-write", path = "deployments" },
    { access = "read-write", path = "./" },
]
ffi = true

# Suppress style lints for API/modifier names we don't control
[lint]
exclude_lints = ["mixed-case-variable", "mixed-case-function"]

[rpc_endpoints]
localhost = "http://127.0.0.1:8545"
hedera_testnet = "https://testnet.hashio.io/api"
hedera_mainnet = "https://mainnet.hashio.io/api"

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"

# See more config options https://book.getfoundry.sh/reference/config/overview
